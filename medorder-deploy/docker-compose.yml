version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/medorder?schema=public
      - NEXTAUTH_URL=http://87.106.23.237:3000
      - NEXTAUTH_SECRET=ein-sehr-langer-geheimer-schluessel-mindestens-32-zeichen-lang
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_FROM=noreply@medorder.de
      - ADMIN_EMAIL=praxis@hausaerzte-im-grillepark.online
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=medorder
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  app-data:
